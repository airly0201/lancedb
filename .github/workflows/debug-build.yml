name: Build Android (v3 - Debug)

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/debug-build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Read Rust version
        id: rust
        run: |
          VERSION=$(cat rust-toolchain.toml | grep "channel" | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ steps.rust.outputs.version }}
          targets: aarch64-linux-android
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      
      - name: Install protoc
        run: |
          mkdir -p ${{ github.workspace }}/protoc
          curl -sLO https://github.com/protocolbuffers/protobuf/releases/download/v25.1/protoc-25.1-linux-x86_64.zip
          unzip -o protoc-25.1-linux-x86_64.zip -d ${{ github.workspace }}/protoc
          rm protoc-25.1-linux-x86_64.zip
      
      - name: Build nodejs
        env:
          CC_aarch64_linux_android: /usr/local/lib/android/sdk/ndk/27.3.13750724/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android25-clang
          AR_aarch64_linux_android: /usr/local/lib/android/sdk/ndk/27.3.13750724/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar
          CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER: /usr/local/lib/android/sdk/ndk/27.3.13750724/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android25-clang
          CARGO_TARGET_AARCH64_LINUX_ANDROID_AR: /usr/local/lib/android/sdk/ndk/27.3.13750724/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar
          PROTOC: ${{ github.workspace }}/protoc/bin/protoc
        run: |
          cd nodejs
          cargo build --release --target aarch64-linux-android 2>&1 | tee build.log
      
      - name: Debug list files
        run: |
          echo "=== Release dir ==="
          ls -la nodejs/target/aarch64-linux-android/release/ 2>/dev/null || echo "No release dir"
          echo ""
          echo "=== Find all .so files ==="
          find nodejs/target/aarch64-linux-android -name "*.so" 2>/dev/null
      
      - name: Upload lancedb artifacts
        run: |
          mkdir -p lancedb-output
          find nodejs/target/aarch64-linux-android/release -name "lancedb*" -type f 2>/dev/null | head -20 | xargs -I {} cp {} lancedb-output/
          ls -la lancedb-output/
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lancedb-android-v3
          path: lancedb-output/
          retention-days: 7
