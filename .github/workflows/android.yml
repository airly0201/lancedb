name: Build Android (aarch64-linux-android)

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read Rust version
        id: rust-version
        run: |
          VERSION=$(cat rust-toolchain.toml | grep "channel" | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Rust version: $VERSION"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ steps.rust-version.outputs.version }}
          targets: aarch64-linux-android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Find available NDK
        run: |
          echo "ANDROID_NDK_HOME: $ANDROID_NDK_HOME"
          ls -la $ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/ | grep aarch64 | head -10

      - name: Configure Cargo for Android
        run: |
          mkdir -p ~/.cargo
          # 使用 aarch64-linux-android25-clang (基于上面找到的实际工具)
          cat >> ~/.cargo/config.toml << CARGO_EOF
          [target.aarch64-linux-android]
          linker = "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android25-clang"
          ar = "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar"
          CARGO_EOF
          echo "Cargo config:"
          cat ~/.cargo/config.toml

      - name: Build nodejs bindings
        run: |
          cd nodejs
          cargo build --release --target aarch64-linux-android 2>&1 | tail -100

      - name: List build output
        run: |
          find . -name "*.so" -type f 2>/dev/null
          ls -la nodejs/target/aarch64-linux-android/release/ 2>/dev/null || echo "No release dir"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lancedb-android-aarch64
          path: |
            nodejs/target/aarch64-linux-android/release/deps/*.so
            nodejs/target/aarch64-linux-android/release/lancedb*.so
            nodejs/target/aarch64-linux-android/release/*.so
          retention-days: 7