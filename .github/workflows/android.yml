name: Build Android Only

on: # trigger
  workflow_dispatch:

jobs:
  android:
    runs-on: # trigger ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: # trigger temurin
          java-version: # trigger '17'
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0
          
      - name: Add Android target
        run: rustup target add aarch64-linux-android
      
      - name: Build Android
        env:
          PROTOC_NO_VENDOR: 1
        run: |
          cd nodejs
          cargo build --release --target aarch64-linux-android --features remote 2>&1
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lancedb-android
          path: nodejs/target/aarch64-linux-android/release/
