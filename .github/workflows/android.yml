name: Build Android Only

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/android.yml'
      - 'nodejs/**'
      - 'rust/**'
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0
          
      - name: Add Android target
        run: rustup target add aarch64-linux-android
      
      - name: Build Android
        run: |
          cd nodejs
          cargo build --release --target aarch64-linux-android --features remote 2>&1
          ls -la target/aarch64-linux-android/release/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lancedb-android
          path: |
            nodejs/target/aarch64-linux-android/release/
            nodejs/target/aarch64-linux-android/release/deps/
