name: Build Android Only

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/android.yml'
      - 'nodejs/**'
      - 'rust/**'
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0
          
      - name: Add Android target
        run: rustup target add aarch64-linux-android
      
      - name: Install Android NDK
        run: |
          mkdir -p $ANDROID_HOME/ndk
          curl -sL https://dl.google.com/android/repository/android-ndk-r27b-linux.zip -o ndk.zip
          unzip -q ndk.zip -d $ANDROID_HOME/ndk
          mv $ANDROID_HOME/ndk/android-ndk-r27b $ANDROID_HOME/ndk/27b
          rm ndk.zip
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Android
        run: |
          export ANDROID_NDK_HOME=/usr/local/lib/android/sdk/ndk/27b
          export PATH=$PATH:$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin
          cd nodejs
          npm ci
          npx napi build --platform --release --target aarch64-linux-android -n lancedb
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lancedb-android
          path: nodejs/lancedb/
