name: Build Android (aarch64-linux-android)

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read Rust version
        id: rust-version
        run: |
          VERSION=$(cat rust-toolchain.toml | grep "channel" | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Rust version: $VERSION"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ steps.rust-version.outputs.version }}
          targets: aarch64-linux-android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android NDK
        run: |
          mkdir -p $ANDROID_HOME/cmdline-tools
          curl -sL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o /tmp/cmdline-tools.zip
          unzip -q /tmp/cmdline-tools.zip -d $ANDROID_HOME/cmdline-tools
          mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;25.2.9519653"

      - name: Show NDK paths
        run: |
          echo "ANDROID_NDK_HOME: $ANDROID_NDK_HOME"
          ls -la $ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/ 2>/dev/null | grep aarch64 | head -10

      - name: Configure Cargo for Android
        run: |
          mkdir -p ~/.cargo
          # 查找正确的 clang 工具
          CLANG_PATH=$(ls $ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android*-clang 2>/dev/null | head -1)
          echo "Using clang: $CLANG_PATH"
          cat >> ~/.cargo/config.toml << CARGO_EOF
          [target.aarch64-linux-android]
          linker = "$CLANG_PATH"
          ar = "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar"
          CARGO_EOF

      - name: Build nodejs bindings
        run: |
          cd nodejs
          cargo build --release --target aarch64-linux-android 2>&1 | tail -100

      - name: List build output
        run: |
          find . -name "*.so" -type f 2>/dev/null
          ls -la nodejs/target/aarch64-linux-android/release/ 2>/dev/null || echo "No release dir"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lancedb-android-aarch64
          path: |
            nodejs/target/aarch64-linux-android/release/deps/*.so
            nodejs/target/aarch64-linux-android/release/lancedb*.so
          retention-days: 7