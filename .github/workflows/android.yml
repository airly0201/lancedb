name: Build Android (aarch64-linux-android)

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read Rust version
        id: rust-version
        run: |
          VERSION=$(cat rust-toolchain.toml | grep "channel" | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ steps.rust-version.outputs.version }}
          targets: aarch64-linux-android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install protoc
        run: |
          mkdir -p ${{ github.workspace }}/protoc
          curl -sLO https://github.com/protocolbuffers/protobuf/releases/download/v25.1/protoc-25.1-linux-x86_64.zip
          unzip -o protoc-25.1-linux-x86_64.zip -d ${{ github.workspace }}/protoc
          rm protoc-25.1-linux-x86_64.zip
          ${{ github.workspace }}/protoc/bin/protoc --version

      - name: Build nodejs bindings (verbose)
        env:
          CC_aarch64_linux_android: /usr/local/lib/android/sdk/ndk/27.3.13750724/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android25-clang
          AR_aarch64_linux_android: /usr/local/lib/android/sdk/ndk/27.3.13750724/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar
          CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER: /usr/local/lib/android/sdk/ndk/27.3.13750724/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android25-clang
          CARGO_TARGET_AARCH64_LINUX_ANDROID_AR: /usr/local/lib/android/sdk/ndk/27.3.13750724/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar
          PROTOC: ${{ github.workspace }}/protoc/bin/protoc
        run: |
          cd nodejs
          cargo build --release --target aarch64-linux-android --verbose 2>&1 | tee ../build.log

      - name: Save full build log
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7

      - name: Debug: List ALL artifacts
        run: |
          echo "=== Checking nodejs/target structure ==="
          find nodejs/target -type f \( -name "*.so" -o -name "*.a" \) 2>/dev/null | head -100
          
          echo ""
          echo "=== Checking release dir ==="
          ls -la nodejs/target/aarch64-linux-android/release/ 2>/dev/null || echo "No release dir"
          
          echo ""
          echo "=== Checking deps dir ==="
          ls -la nodejs/target/aarch64-linux-android/release/deps/ 2>/dev/null | head -20
          
          echo ""
          echo "=== Full tree (first 2 levels) ==="
          find nodejs/target/aarch64-linux-android -maxdepth 2 -type f 2>/dev/null | head -50

      - name: Upload artifacts (comprehensive)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lancedb-android-all
          path: |
            nodejs/target/aarch64-linux-android/**
            !nodejs/target/aarch64-linux-android/.cargo
            !nodejs/target/aarch64-linux-android/incremental
          retention-days: 7