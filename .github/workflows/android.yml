name: Build Android (Minimal)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Build Android
        run: |
          cd nodejs
          cargo build --release --target aarch64-linux-android --features remote
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lancedb-android
          path: nodejs/target/aarch64-linux-android/release/
