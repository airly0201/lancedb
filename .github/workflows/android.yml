name: Build Android (aarch64-linux-android)

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read Rust version
        id: rust-version
        run: |
          VERSION=$(cat rust-toolchain.toml | grep "channel" | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ steps.rust-version.outputs.version }}
          targets: aarch64-linux-android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android NDK
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;25.2.9519653" 2>/dev/null || true
          # 创建通用 clang 名称的符号链接（aws-lc-sys 需要）
          NDK_BIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          ln -sf "$NDK_BIN/aarch64-linux-android21-clang" "$NDK_BIN/aarch64-linux-android-clang"
          ln -sf "$NDK_BIN/aarch64-linux-android21-clang++" "$NDK_BIN/aarch64-linux-android-clang++"
          ls -la "$NDK_BIN"/aarch64-linux-android*-clang*

      - name: Install protoc
        run: |
          mkdir -p ${{ github.workspace }}/protoc
          curl -sLO https://github.com/protocolbuffers/protobuf/releases/download/v25.1/protoc-25.1-linux-x86_64.zip
          unzip -o protoc-25.1-linux-x86_64.zip -d ${{ github.workspace }}/protoc
          rm protoc-25.1-linux-x86_64.zip
          ls -la ${{ github.workspace }}/protoc/bin/
          # 直接用完整路径运行 protoc
          ${{ github.workspace }}/protoc/bin/protoc --version

      - name: Build nodejs bindings
        env:
          CC_aarch64_linux_android: /usr/local/lib/android/sdk/ndk/27.3.13750724/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android25-clang
          AR_aarch64_linux_android: /usr/local/lib/android/sdk/ndk/27.3.13750724/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar
          CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER: /usr/local/lib/android/sdk/ndk/27.3.13750724/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android25-clang
          CARGO_TARGET_AARCH64_LINUX_ANDROID_AR: /usr/local/lib/android/sdk/ndk/27.3.13750724/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar
          PROTOC: ${{ github.workspace }}/protoc/bin/protoc
        run: |
          cd nodejs
          cargo build --release --target aarch64-linux-android 2>&1 | tail -100

      - name: List build output
        run: |
          cd nodejs
          echo "=== Find all .so files ==="
          find . -name "*.so" -type f 2>/dev/null
          echo "=== Find all .a files ==="
          find . -name "*.a" -type f 2>/dev/null | head -20
          echo "=== List release dir ==="
          ls -la target/aarch64-linux-android/release/ 2>/dev/null || echo "No release dir"
          echo "=== List target dir structure ==="
          ls -la target/ 2>/dev/null || echo "No target dir"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lancedb-android-aarch64
          path: |
            nodejs/target/**/release/deps/*.so
            nodejs/target/**/release/lancedb*.so
            nodejs/target/**/release/liblancedb*.so
            nodejs/target/**/release/*.so
          retention-days: 7