name: Build Android Only

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0
          
      - name: Add Android target
        run: rustup target add aarch64-linux-android
      
      - name: Build Android
        run: |
          cd nodejs
          cargo build --release --target aarch64-linux-android 2>&1
          echo "=== Checking target dir ==="
          find target -type f -name "*.so" 2>/dev/null
          find target -type f -name "*.a" 2>/dev/null
          ls -la target/aarch64-linux-android/release/ 2>/dev/null || echo "No release dir"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lancedb-android
          path: nodejs/target/
